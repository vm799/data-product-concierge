version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dpc-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dpc-network
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    container_name: dpc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dpc_db}
      POSTGRES_USER: ${POSTGRES_USER:-dpc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpc_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dpc-network

volumes:
  postgres_data:
    driver: local

networks:
  dpc-network:
    driver: bridge
